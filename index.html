  /* ── Etiqueta FRUTAS Y VERDURAS ── */
  .cat-label {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,100,0,0.85);
    backdrop-filter: blur(4px);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 18px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.3);
    white-space: nowrap;
    z-index: 2;
  }

  /* ── Logo EL GORDO ── */

    position: relative;
    z-index: 2;
    text-align: center;
    line-height: 1;
  }

      5px 5px 12px rgba(0,0,0,0.7),

    display: flex;

    justify-content: center;

    background: #fff;

  .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }

  .wa-icon {

    font-weight: 700;

  /* ── Horarios ── */
  .schedule {

    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.5s 0.5s both;

  .schedule-header {
    background: linear-gradient(90deg, #FFE700, #FF9900);

    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;

  .schedule-body {

  .schedule-row {

  .sch-day {

  .sch-time {
